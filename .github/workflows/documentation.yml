name: Documentation

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/documentation.yml"
      - "CMakeLists.txt"
      - "docs/**"
      - "pyseb/**"
      - "seb/**"
      - "seb-symbolic/**"
  pull_request:
    paths:
      - ".github/workflows/documentation.yml"
      - "CMakeLists.txt"
      - "docs/**"
      - "pyseb/**"
      - "seb/**"
      - "seb-symbolic/**"

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgsl-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pybind11 jupyter numpy matplotlib "sympy>=1.12"

      - name: Configure pySEB and tutorials
        run: |
          cmake -S . -B build-docs -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_PYTHON=ON \
            -DBUILD_DOC_TUTORIALS=ON \
            -DSEB_ENABLE_GINAC_BACKEND=OFF

      - name: Build pySEB and C++ tutorials
        run: cmake --build build-docs --target _pyseb doc-tutorials

      - name: Render Quarto website
        env:
          PYTHONPATH: ${{ github.workspace }}/build-docs/pyseb:${{ github.workspace }}/build-docs:${{ github.workspace }}
          PYSEB_TUTORIAL_BIN_DIR: ${{ github.workspace }}/build-docs/docs-tutorials
        run: quarto render docs

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/_site

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
