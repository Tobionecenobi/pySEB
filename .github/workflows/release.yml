name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  cxx-tests:
    name: C++ tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgsl-dev libginac-dev libgtest-dev pkg-config

      - name: Configure and build GiNaC core
        run: |
          cmake -S . -B build-ninja-ginac -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_PYTHON=OFF \
            -DSEB_ENABLE_GINAC_BACKEND=ON
          cmake --build build-ninja-ginac

      - name: Configure and build tests
        run: |
          cmake -S Tests -B Tests/build-ninja -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSEB_BUILD_DIR="$GITHUB_WORKSPACE/build-ninja-ginac"
          cmake --build Tests/build-ninja

      - name: Run tests
        run: ctest --test-dir Tests/build-ninja --output-on-failure

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build twine
          python -m build --sdist
          twine check dist/*

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  wheels:
    name: Wheels (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            cibw_archs: x86_64
            macos_deployment_target: ""
          - name: windows-amd64
            os: windows-latest
            cibw_archs: AMD64
            macos_deployment_target: ""
          - name: macos-x86_64
            os: macos-13
            cibw_archs: x86_64
            macos_deployment_target: "10.13"
          - name: macos-arm64
            os: macos-15
            cibw_archs: arm64
            macos_deployment_target: "15.0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.1.4
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment_target }}
        with:
          output-dir: wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [cxx-tests, sdist, wheels]
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Check distributions
        run: |
          python -m pip install --upgrade pip twine
          twine check dist/*

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
